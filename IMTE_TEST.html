<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mock Test — 100 MCQs</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f6f8fb;color:#222;margin:0;padding:0}
  .container{max-width:900px;margin:28px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.08)}
  h1{margin:0 0 12px;font-size:22px}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .meta .small{font-size:13px;color:#555}
  #quizArea{margin-top:10px}
  .questionCard{border:1px solid #e3e7ee;padding:14px;border-radius:6px;margin-bottom:12px;background:#fbfdff}
  .qtext{font-weight:600;margin-bottom:8px}
  .options label{display:block;padding:8px;border-radius:6px;border:1px solid transparent;margin-bottom:6px;cursor:pointer}
  .options input{margin-right:8px}
  .options label:hover{background:#eef6ff}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  button{padding:8px 12px;border-radius:6px;border:0;background:#0b6cff;color:#fff;cursor:pointer}
  button.secondary{background:#6c757d}
  button.ghost{background:#fff;color:#0b6cff;border:1px solid #cfe0ff}
  .scoreBox{padding:12px;background:#f1f9ee;border:1px solid #d6efd6;border-radius:6px;margin-top:12px}
  .review .correct{background:#e6ffea;border-left:4px solid #2ea44f;padding:8px;margin-top:6px}
  .review .wrong{background:#fff0f0;border-left:4px solid #d73a49;padding:8px;margin-top:6px}
  .footer{margin-top:16px;font-size:13px;color:#555}
  .timer{font-weight:700;color:#d9534f}
  .navGrid{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .navGrid button{min-width:36px;padding:6px 8px}
  .hidden{display:none}
  @media (max-width:600px){.meta{flex-direction:column;align-items:flex-start;gap:8px}}
</style>
</head>
<body>
<div class="container">
  <h1>Mock Test — 100 MCQs</h1>
  <div class="meta">
    <div class="small">Questions: <strong id="totalQ">100</strong> • <span id="modeLabel">Randomized</span></div>
    <div class="small">Time: <span id="timerDisplay">No timer</span></div>
  </div>

  <div id="quizArea"></div>

  <div class="controls">
    <button id="prevBtn" class="secondary">Previous</button>
    <button id="nextBtn" class="secondary">Next</button>
    <button id="submitBtn">Submit</button>
    <button id="restartBtn" class="ghost">Restart</button>
    <button id="printBtn" class="ghost">Print Results</button>
    <label style="margin-left:auto;font-size:13px">
      Timer (minutes):
      <input id="timerInput" type="number" min="0" max="180" value="0" style="width:70px;margin-left:6px;padding:6px;border-radius:6px;border:1px solid #ccc"/>
    </label>
  </div>

  <div id="scoreArea" class="hidden"></div>

  <div class="footer">Tip: Save the file as <strong>mock_quiz.html</strong> and open in a browser. Host on GitHub Pages to share online.</div>
</div>

<script>

{"q":"Variable cost per km decreases when what happens?","options":["Fuel price rises","Vehicle utilization increases (more km spread fixed costs)","Maintenance frequency increases","Driver wages increase per trip"],"answer":1},

{"q":"Trip sheet differs from log sheet because it records what?","options":["Inventory levels","Trip revenue and passenger/goods details","Employee salaries","Shareholder meetings"],"answer":1},
{"q":"Which is a method of wage payment that rewards output above a standard?","options":["Time rate only","Incentive plans (piece rate, bonus)","Fixed salary only","Reimbursement"],"answer":1},

{"q":"EOQ (Economic Order Quantity) minimizes what?","options":["Production time","Total inventory cost (ordering + carrying)","Lead time only","Supplier count"],"answer":1},

{"q":"Human values include all EXCEPT which option?","options":["Honesty","Respect","Compassion","Obsolescence"],"answer":3},
{"q":"Market research primary method is what?","options":["Industry reports only","Surveys and interviews","Trip sheets","Way bills"],"answer":1},

];

/* ====== QUIZ LOGIC ====== */
let questions = [];
let currentIndex = 0;
let answers = []; // store selected index or null
let timerId = null;
let timeRemaining = 0;

const totalQ = QUESTIONS.length;
document.getElementById('totalQ').textContent = totalQ;

function shuffleArray(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function startQuiz(){
  // clone and randomize questions and options
  questions = JSON.parse(JSON.stringify(QUESTIONS));
  shuffleArray(questions);
  questions.forEach(q=>{
    // shuffle options but keep track of correct index
    const correctText = q.options[q.answer];
    shuffleArray(q.options);
    q.answer = q.options.indexOf(correctText);
  });
  answers = Array(questions.length).fill(null);
  currentIndex = 0;
  renderQuestion();
  document.getElementById('scoreArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  document.getElementById('modeLabel').textContent = 'Randomized';
  // timer
  const tmin = parseInt(document.getElementById('timerInput').value || "0",10);
  if(timerId) { clearInterval(timerId); timerId=null; }
  if(tmin>0){
    timeRemaining = tmin*60;
    document.getElementById('timerDisplay').textContent = formatTime(timeRemaining);
    timerId = setInterval(()=>{
      timeRemaining--;
      document.getElementById('timerDisplay').textContent = formatTime(timeRemaining);
      if(timeRemaining<=0){ clearInterval(timerId); timerId=null; submitQuiz(); }
    },1000);
  } else {
    document.getElementById('timerDisplay').textContent = 'No timer';
  }
}

function formatTime(sec){
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = (sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function renderQuestion(){
  const q = questions[currentIndex];
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  const card = document.createElement('div'); card.className='questionCard';
  const qnum = document.createElement('div'); qnum.className='qtext'; qnum.textContent = `Q${currentIndex+1}. ${q.q}`;
  card.appendChild(qnum);
  const opts = document.createElement('div'); opts.className='options';
  q.options.forEach((opt,i)=>{
    const id = `q${currentIndex}_opt${i}`;
    const label = document.createElement('label');
    label.htmlFor = id;
    const radio = document.createElement('input');
    radio.type='radio'; radio.name='opt'; radio.id=id; radio.value=i;
    if(answers[currentIndex]===i) radio.checked=true;
    radio.addEventListener('change',()=>{ answers[currentIndex]=i; });
    label.appendChild(radio);
    label.appendChild(document.createTextNode(opt));
    opts.appendChild(label);
  });
  card.appendChild(opts);

  // navigation grid
  const nav = document.createElement('div'); nav.className='navGrid';
  for(let i=0;i<questions.length;i++){
    const btn = document.createElement('button');
    btn.textContent = i+1;
    btn.className = (answers[i]===null)?'secondary':'';
    btn.addEventListener('click',()=>{ currentIndex=i; renderQuestion(); });
    nav.appendChild(btn);
    if(i>=19) break; // show first 20 quick buttons to avoid huge UI
  }
  card.appendChild(nav);

  area.appendChild(card);
  // update prev/next button states
  document.getElementById('prevBtn').disabled = (currentIndex===0);
  document.getElementById('nextBtn').disabled = (currentIndex===questions.length-1);
}

function goNext(){ if(currentIndex<questions.length-1){ currentIndex++; renderQuestion(); } }
function goPrev(){ if(currentIndex>0){ currentIndex--; renderQuestion(); } }

function submitQuiz(){
  if(timerId){ clearInterval(timerId); timerId=null; }
  // compute score
  let score=0;
  const review = [];
  for(let i=0;i<questions.length;i++){
    const sel = answers[i];
    const correct = questions[i].answer;
    if(sel===correct) score++;
    review.push({q:questions[i].q, options:questions[i].options, selected:sel, correct});
  }
  showScore(score, review);
}

function showScore(score, review){
  const area = document.getElementById('scoreArea');
  area.classList.remove('hidden');
  area.innerHTML = '';
  const box = document.createElement('div'); box.className='scoreBox';
  box.innerHTML = `<strong>Score:</strong> ${score} / ${questions.length} &nbsp; (${Math.round(score/questions.length*100)}%)`;
  area.appendChild(box);

  const revDiv = document.createElement('div'); revDiv.className='review';
  review.forEach((r,i)=>{
    const qd = document.createElement('div'); qd.style.marginTop='10px';
    qd.innerHTML = `<div style="font-weight:600">Q${i+1}. ${r.q}</div>`;
    r.options.forEach((opt,idx)=>{
      const p = document.createElement('div');
      p.style.padding='6px';
      if(idx===r.correct){ p.className='correct'; p.textContent = `Correct: ${opt}`; }
      if(r.selected!==null && idx===r.selected && idx!==r.correct){ p.className='wrong'; p.textContent = `Your answer: ${opt}`; }
      if(r.selected===null && idx!==r.correct){ /* nothing */ }
      qd.appendChild(p);
    });
    revDiv.appendChild(qd);
  });
  area.appendChild(revDiv);
  // hide quiz area
  document.getElementById('quizArea').classList.add('hidden');
}

document.getElementById('nextBtn').addEventListener('click',goNext);
document.getElementById('prevBtn').addEventListener('click',goPrev);
document.getElementById('submitBtn').addEventListener('click',submitQuiz);
document.getElementById('restartBtn').addEventListener('click',startQuiz);
document.getElementById('printBtn').addEventListener('click',()=>{ window.print(); });

/* initialize */
startQuiz();
</script>
</body>
</html>
